<!doctype html>
<html>
  <head>
    <title>MingBo Pro - 开源后台管理模板</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MingBo Pro (明博 Pro) — 基于 Vue 3、TypeScript、Element Plus 和 Tailwind CSS 构建的现代化开源后台管理模板。"
    />
    <link rel="icon" type="image/svg+xml" href="/src/assets/images/favicon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/src/assets/images/favicon.ico" />

    <style>
      /* 防止页面刷新时白屏的初始样式 */
      html {
        background-color: #fafbfc;
      }

      html.dark {
        background-color: #070707;
      }
    </style>

    <script>
      // 初始化 html class 主题属性
      ;(function () {
        try {
          if (typeof Storage === 'undefined' || !window.localStorage) {
            return
          }

          const themeType = localStorage.getItem('sys-theme')
          if (themeType === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          console.warn('Failed to apply initial theme:', e)
        }
      })()
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
